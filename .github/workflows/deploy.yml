# =============================================================================
# deploy.yml — ACDG-BV deploy manual (workflow_dispatch)
# -----------------------------------------------------------------------------
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# STUB — NÃO OPERACIONAL. A VPS Magalu ainda não foi provisionada (ADR-009).
# Este arquivo documenta a intenção de deploy e reserva os hooks corretos.
# Ative os passos comentados quando a infraestrutura existir.
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
#
# Pré-requisitos antes de ativar:
#   1. VPS `BV4-16-50` provisionada via OpenTofu (provider MagaluCloud/mgc v0.50.x)
#   2. Block Storage NVMe montado em /data
#   3. Secrets configurados no repositório GitHub:
#        SSH_PRIVATE_KEY  — chave privada ED25519 (sem passphrase) do deploy user
#        DEPLOY_HOST      — IP ou hostname da VPS (ex: vps.acdg-bv.org.br)
#      NÃO inclua outros secrets aqui; os secrets de aplicação ficam no
#      Infisical/Vaultwarden self-hosted na própria VPS (ADR-009 §7).
#   4. scripts/deploy.sh presente no repo e com `chmod +x`.
#   5. Deploy user no host com sudo restrito a `docker compose` e `systemctl`.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo (production é o único no BV)"
        required: true
        default: production
        type: choice
        options:
          - production
      reason:
        description: "Motivo do deploy manual (registrado no log)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy para VPS ACDG-BV
    runs-on: ubuntu-latest
    # TODO: descomentar quando o environment "production" existir no repo GitHub
    # environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log do deploy
        run: |
          echo "=== ACDG-BV Deploy ==="
          echo "Ambiente : ${{ inputs.environment }}"
          echo "Motivo   : ${{ inputs.reason || '(não informado)' }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Ator     : ${{ github.actor }}"
          echo "Data UTC : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "====================================="

      # -----------------------------------------------------------------------
      # TODO: descomentar e ajustar quando a VPS existir.
      #
      # O script scripts/deploy.sh deve:
      #   1. cd /opt/acdg-bv/infra
      #   2. git pull --ff-only
      #   3. docker compose -f compose/compose.yml pull --quiet
      #   4. docker compose -f compose/compose.yml up -d --remove-orphans
      #   5. docker system prune -f --volumes=false
      # -----------------------------------------------------------------------
      - name: "STUB — SSH deploy (desabilitado até VPS existir)"
        run: |
          echo "::warning::Deploy via SSH está desabilitado — VPS ainda não provisionada."
          echo "Quando ativo, este step executará scripts/deploy.sh no host remoto."
          echo "Secrets necessários: SSH_PRIVATE_KEY, DEPLOY_HOST"

