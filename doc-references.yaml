# =============================================================================
# doc-references.yaml
# -----------------------------------------------------------------------------
# Catálogo MESTRE de todas as referências de documentação técnica usadas pelos
# 4 serviços do deploy ACDG-BV (Roraima). Serviu de plano de download para o
# espelho OFFLINE em infra/reference/ (dump fiel, não resumo) — no mesmo modelo
# dos dumps já existentes em web/handbook/reference/.
#
# Gerado em: 2026-05-27  (varredura dos 4 repos: social-care, people-context,
#                         analysis-bi, web). Download executado em 2026-05-27.
#
# ESTADO ATUAL: a maioria dos targets já foi baixada (ver infra/reference/README.md,
# que é o MANIFESTO autoritativo do espelho, com SHAs e contagens). O campo
# `offline_status` abaixo reflete o estado pós-download.
#
# LEGENDA offline_status:
#   downloaded  -> espelhado localmente (ver `local_path`)
#   partial     -> espelho incompleto / fonte sem markdown público
#   pending     -> ainda não baixado (sem fonte estável ou despriorizado)
# =============================================================================

meta:
  deploy: "ACDG-BV / Roraima (VPS única, single-tenant)"
  source_of_truth_adr: "web/handbook/architecture/adr/009-deployment-architecture-acdg-bv.md"
  scanned_repos: [social-care, people-context, analysis-bi, web]
  generated: "2026-05-27"
  mirror_manifest: "infra/reference/README.md"
  download_root: "infra/reference/<category>/<id>/   (dumps novos; os já espelhados ficam em web/handbook/reference/)"
  mirror_summary: "~324 MB · 6836 .md/.mdx · 94 .html · 6 RFC .txt · 2 PDF (PostgreSQL 15/16) · 1 ZIP (FHIR R4 201MB)"
  removed_legacy:
    - "zitadel — IdP descartado em favor do Authentik (decisão do deploy BV). Não baixar docs."
  still_pending:
    - "datasus-dbf-dbc — sem doc oficial online estável"
    - "apns — despriorizado (avaliar se é dependência ativa)"

# -----------------------------------------------------------------------------
# Visão por serviço — stack resumida (detalhe completo em `targets`)
# -----------------------------------------------------------------------------
services:
  social-care:
    repo: "github.com/acdgbrasil/svc-social-care"
    language: "Swift 6.3.2 (local) / 6.3 (Docker) / 6.2 (CI)"
    framework: "Vapor 4.121.3"
    db: "PostgreSQL 15"
    messaging: "NATS/JetStream (cliente NIO custom, ADR-016)"
    auth: "OIDC via Authentik (self-hosted, IdP único), vapor/jwt 5.1.2"
    patterns: [CQRS, DDD, Clean Architecture, Transactional Outbox, PoP, CRU]
    container: "swift:6.3-jammy -> swift:6.3-jammy-slim (Ubuntu 22.04)"

  people-context:
    repo: "github.com/acdgbrasil/svc-people-context"
    language: "TypeScript 5.9.3 (funcional, no-class)"
    runtime: "Bun 1.3.11"
    framework: "Elysia 1.4.28"
    db: "PostgreSQL 15 (driver postgres.js 3.4.9)"
    messaging: "NATS/JetStream 2.10 (nats.js 2.29.3)"
    auth: "jose 6.2.2 (JWT RS256/JWKS), Authentik (Management API, IdP único)"
    patterns: [Transactional Outbox, Branded Types, Discriminated Unions, RBAC]
    container: "oven/bun:1.3-slim -> gcr.io/distroless/cc-debian12"

  analysis-bi:
    repo: "github.com/acdgbrasil/svc-analysis-bi"
    language: "Go 1.25.0"
    router: "go-chi/chi v5.2.5"
    db: "PostgreSQL 15 (driver jackc/pgx v5.9.1) — star schema"
    messaging: "NATS/JetStream 2 (nats-io/nats.go v1.50.0) — durable consumer"
    privacy: [K-anonymity K=5, HMAC-SHA256, LGPD, never-persist-PII]
    exports: [CSV, JSON, XML, Parquet, DBF, DBC, ODS, "FHIR R4 BR Core"]
    container: "golang:1.25-alpine -> scratch (~10MB)"

  web:
    repo: "github.com/acdgbrasil/web"
    status: "pre-Sprint 0 (sem src/ — stack decidida em 16 ADRs)"
    language: "TypeScript 6.0.3 (strict)"
    runtime: "Node 24 LTS + pnpm 10"
    framework: "TanStack Start (Vite + Nitro) + React 19"
    ui: "React Aria Components 1.17+ / Tailwind v4 / shadcn CLI v4 / Material 3"
    role: "front + BFF (único serviço público; injeta Bearer OIDC)"
    patterns: [BFF orchestration, "vertical slices + DDD", Zod schemas, ViewModels]

