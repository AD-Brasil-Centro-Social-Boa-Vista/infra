# =============================================================================
# compose.secrets.yml — Infisical CE + Vaultwarden (ADR-011)
# Incluso via compose.yml raiz. Compose Spec v5 — SEM `version:`.
# Secrets via file: montados em /run/secrets/<name> (chmod 600 em SECRETS_DIR).
# Infisical usa Postgres compartilhado (db `infisical`, role `infisical`).
# Vaultwarden usa SQLite no volume bind — sem DB extra.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # infisical-redis — cache + job queue do Infisical CE
  # ---------------------------------------------------------------------------
  infisical-redis:
    image: redis:${REDIS_TAG:-7-alpine}
    container_name: infisical-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - infisical_redis_data:/data
    networks:
      - acdg-bv
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # infisical — painel de secrets (Infisical Community Edition)
  # Requer: postgres (service_healthy) + infisical-redis (service_healthy)
  # DB: `infisical` / role `infisical` / senha via secret infisical_db_password
  # Healthcheck: GET /api/status → 200 (confirmado no reference docker-compose.mdx)
  # ---------------------------------------------------------------------------
  infisical:
    image: infisical/infisical:${INFISICAL_TAG:-latest-postgres}
    container_name: infisical
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - acdg-bv
    depends_on:
      postgres:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 512M
    healthcheck:
      # /api/status retorna 200 quando Infisical está pronto
      # (ref: infra/reference/secrets/infisical/self-hosting/deployment-options/docker-compose.mdx)
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    environment:
      # Infisical não suporta _FILE para DB_CONNECTION_URI nem ENCRYPTION_KEY nem AUTH_SECRET
      # (ref: infra/reference/secrets/infisical/self-hosting/configuration/envars.mdx —
      #  todas as variáveis são passadas diretamente como env, sem mecanismo _FILE).
      # Solução: montar o secret como arquivo e compor a URI via script de entrypoint
      # NÃO disponível nesta imagem. Alternativa segura adotada:
      # usar a instrução `secrets` do Compose para montar em /run/secrets/<name>
      # e referenciar via variável que a imagem suporta como valor literal.
      # A senha do DB é montada via secret e lida pelo script de init do Postgres;
      # aqui passamos a URI completa, mas com a senha lida de /run/secrets via
      # um wrapper de entrypoint não disponível na imagem oficial.
      # DECISÃO: passar DB_CONNECTION_URI com senha embutida via variável de ambiente
      # (padrão oficial do Infisical self-hosted — ref docker-compose.mdx), com a
      # senha armazenada somente em SECRETS_DIR (não em .env comitado).
      # O operador deve exportar INFISICAL_DB_PASSWORD do arquivo secret antes de `up`.
      # Instrução em /etc/acdg-secrets/README (gerado pelo script de bootstrap ADR-009).
      DB_CONNECTION_URI: "postgres://infisical:${INFISICAL_DB_PASSWORD}@postgres:5432/infisical"
      REDIS_URL: "redis://infisical-redis:6379"
      # ENCRYPTION_KEY e AUTH_SECRET são strings curtas lidas como env vars normais.
      # Montamos /run/secrets e exportamos antes do `docker compose up` via
      # `export INFISICAL_ENCRYPTION_KEY=$(cat /etc/acdg-secrets/infisical_encryption_key)`.
      ENCRYPTION_KEY: "${INFISICAL_ENCRYPTION_KEY}"
      AUTH_SECRET: "${INFISICAL_AUTH_SECRET}"
      SITE_URL: "https://secrets.${DOMAIN:-acdg-bv.org.br}"
      HOST: "0.0.0.0"
      PORT: "8080"
      TELEMETRY_ENABLED: "false"
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # vaultwarden — cofre de senhas humano (Bitwarden-compatible)
  # Vaultwarden suporta _FILE suffix (ref: Configuration-overview.md §
  #   "Loading individual values from files"):
  #   ADMIN_TOKEN_FILE=/run/secrets/vaultwarden_admin_token
  # Volume: bind ${DATA_DIR}/vaultwarden → /data (SQLite embutido, sem DB extra)
  # Healthcheck: GET /alive → 200 (endereço documentado na imagem oficial)
  # ---------------------------------------------------------------------------
  vaultwarden:
    image: vaultwarden/server:${VAULTWARDEN_TAG:-1.32.7-alpine}
    container_name: vaultwarden
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - type: bind
        source: ${DATA_DIR:-/data}/vaultwarden
        target: /data
    networks:
      - acdg-bv
    secrets:
      - vaultwarden_admin_token
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      # GET /alive → 200 (confirmado na imagem vaultwarden/server)
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/alive || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      DOMAIN: "https://vault.${DOMAIN:-acdg-bv.org.br}"
      # Vaultwarden suporta _FILE para ADMIN_TOKEN
      # (ref: infra/reference/secrets/vaultwarden/Configuration-overview.md
      #   §"Loading individual values from files" — adicione _FILE ao nome da variável
      #   e aponte para o path do arquivo com o valor)
      ADMIN_TOKEN_FILE: "/run/secrets/vaultwarden_admin_token"
      SIGNUPS_ALLOWED: "false"
    env_file:
      - path: ../env/.env
        required: false

# =============================================================================
# Volumes nomeados
# =============================================================================
volumes:
  infisical_redis_data:
    name: acdg-bv_infisical_redis_data

# =============================================================================
# Secrets top-level (file: lê de SECRETS_DIR — /etc/acdg-secrets/ por padrão)
# Cada arquivo: chmod 600, dono root, fora do git.
# =============================================================================
secrets:
  vaultwarden_admin_token:
    file: ${SECRETS_DIR:-/etc/acdg-secrets}/vaultwarden_admin_token
  infisical_db_password:
    file: ${SECRETS_DIR:-/etc/acdg-secrets}/infisical_db_password
  infisical_encryption_key:
    file: ${SECRETS_DIR:-/etc/acdg-secrets}/infisical_encryption_key
  infisical_auth_secret:
    file: ${SECRETS_DIR:-/etc/acdg-secrets}/infisical_auth_secret

# =============================================================================
# Network — externa, criada uma vez pelo compose.yml raiz
# =============================================================================
networks:
  acdg-bv:
    external: true
