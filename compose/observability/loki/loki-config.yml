# =============================================================================
# loki-config.yml — configuração mínima válida do Grafana Loki
# Montado read-only em /etc/loki/loki-config.yml no container loki.
# Modo: single-process (monolith) — adequado para single-VPS ACDG-BV.
# Storage: filesystem local em /loki (volume bind loki_data).
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

# Configuração do anel de membros (single-node não precisa de anel real)
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# Schema de índices — versão 13 (boltdb-shipper → tsdb é recomendada em Loki 3.x)
schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retenção de logs: 30 dias
limits_config:
  retention_period: 720h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

# Compactor para aplicar retenção
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: filesystem

# Ruler (desabilitado — sem regras de alerta por enquanto)
ruler:
  alertmanager_url: http://alertmanager:9093
