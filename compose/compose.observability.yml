# =============================================================================
# compose.observability.yml — Prometheus + Grafana + Loki + Alertmanager
#                             + node-exporter + postgres-exporter + cAdvisor
# Incluso via compose.yml raiz. Compose Spec v5 — SEM `version:`.
# TODOS os serviços deste arquivo têm `profiles: ["observability"]`.
# Subir: docker compose --profile observability up -d
# Configs montadas read-only de ./observability/ (relativo ao compose.yml raiz).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # prometheus — coleta de métricas (scrape pull)
  # Config: observability/prometheus/prometheus.yml (montada read-only)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    profiles: ["observability"]
    expose:
      - "9090"
    volumes:
      - prometheus_data:/prometheus
      - type: bind
        source: ./observability/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - acdg-bv
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # grafana — dashboards de visualização
  # Config: observability/grafana/provisioning/ (datasources auto-provisionados)
  # Admin password via secret grafana_admin_password
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    profiles: ["observability"]
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - type: bind
        source: ./observability/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
    networks:
      - acdg-bv
    secrets:
      - grafana_admin_password
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      # Grafana suporta __FILE suffix para variáveis de ambiente sensíveis.
      # GF_SECURITY_ADMIN_PASSWORD__FILE instrui o Grafana a ler a senha do arquivo.
      GF_SECURITY_ADMIN_PASSWORD__FILE: "/run/secrets/grafana_admin_password"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN:-acdg-bv.org.br}"
      GF_LOG_LEVEL: "warn"
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # loki — agregação de logs (Grafana Loki)
  # Config: observability/loki/loki-config.yml (montada read-only)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    profiles: ["observability"]
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
      - type: bind
        source: ./observability/loki/loki-config.yml
        target: /etc/loki/loki-config.yml
        read_only: true
    command: ["-config.file=/etc/loki/loki-config.yml"]
    networks:
      - acdg-bv
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # alertmanager — roteamento de alertas (Telegram/email)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    profiles: ["observability"]
    expose:
      - "9093"
    volumes:
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - acdg-bv
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # node-exporter — métricas do host (CPU, RAM, disco, rede)
  # Bind mounts do host em read-only para acesso a métricas do SO.
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    profiles: ["observability"]
    expose:
      - "9100"
    volumes:
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
      - type: bind
        source: /
        target: /rootfs
        read_only: true
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - acdg-bv
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics | head -1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # postgres-exporter — métricas do Postgres 16 compartilhado
  # DATA_SOURCE_NAME referencia o Postgres via rede interna acdg-bv.
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    profiles: ["observability"]
    expose:
      - "9187"
    networks:
      - acdg-bv
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics | head -1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      # Conecta ao Postgres compartilhado com o superuser para scrape de todas as DBs.
      # A senha é passada aqui como env var; em produção exportar do secret file:
      # export POSTGRES_EXPORTER_PASSWORD=$(cat /etc/acdg-secrets/postgres_superuser_password)
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_SUPERUSER:-postgres}:${POSTGRES_SUPERUSER_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    env_file:
      - path: ../env/.env
        required: false

  # ---------------------------------------------------------------------------
  # cadvisor — métricas de containers Docker (CPU, RAM, rede por container)
  # Monta o socket Docker e cgroups do host em read-only.
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    profiles: ["observability"]
    expose:
      - "8080"
    volumes:
      - type: bind
        source: /
        target: /rootfs
        read_only: true
      - type: bind
        source: /var/run
        target: /var/run
        read_only: true
      - type: bind
        source: /sys
        target: /sys
        read_only: true
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
        read_only: true
    networks:
      - acdg-bv
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - path: ../env/.env
        required: false

# =============================================================================
# Volumes nomeados
# =============================================================================
volumes:
  prometheus_data:
    name: acdg-bv_prometheus_data
  grafana_data:
    name: acdg-bv_grafana_data
  loki_data:
    name: acdg-bv_loki_data
  alertmanager_data:
    name: acdg-bv_alertmanager_data

# =============================================================================
# Secrets top-level
# =============================================================================
secrets:
  grafana_admin_password:
    file: ${SECRETS_DIR:-/etc/acdg-secrets}/grafana_admin_password

# =============================================================================
# Network — externa, criada pelo compose.yml raiz
# =============================================================================
networks:
  acdg-bv:
    name: acdg-bv
